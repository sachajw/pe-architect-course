apiVersion: v1
kind: ConfigMap
metadata:
  name: teams-ui-nginx-config
data:
  default.conf: |
    server {
        listen 80;
        server_name localhost;

        root /usr/share/nginx/html;
        index index.html;

        # Rewrite hardcoded API URL to include port 8888 (SSH tunnel port)
        sub_filter "http://teams-api.127.0.0.1.sslip.io" "http://teams-api.127.0.0.1.sslip.io:8888";
        sub_filter_once off;
        sub_filter_types application/javascript;

        # Handle Angular routing
        location / {
            try_files $uri $uri/ /index.html;
        }

        # API proxy to backend service
        location /api/ {
            proxy_pass http://teams-api-service:8000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Health check endpoint
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
    }
